<div class="container">
  <div class="card">

    <div class="header">
      <h1>📈 Trade Alert</h1>
      <p>Get real-time crypto prices from Binance</p>
    </div>

    <!-- Loading coins -->
    <div class="loading-coins" *ngIf="coinsLoading">
      <span>Loading coins...</span>
    </div>

    <div class="form-section" *ngIf="!coinsLoading">
      <label for="coinSelect">Select Coin</label>
      <select id="coinSelect" [(ngModel)]="selectedSymbol">
        <option *ngFor="let coin of coins" [value]="coin.symbol">
          {{ coin.coinName }}
        </option>
      </select>

      <button (click)="getPrice()" [disabled]="loading || coins.length === 0">
        <span *ngIf="!loading">Get Price</span>
        <span *ngIf="loading">Fetching...</span>
      </button>
    </div>

    <!-- Price result -->
    <div class="result" *ngIf="priceData">
      <div class="price-card">
        <span class="coin-label">{{ priceData.symbol }}</span>
        <span class="price-value">${{ priceData.price | number:'1.2-2' }}</span>
      </div>
    </div>

    <!-- Error -->
    <div class="error" *ngIf="errorMessage">
      <span>⚠️ {{ errorMessage }}</span>
    </div>

  </div>
</div>
