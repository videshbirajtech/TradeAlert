<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">

    <div class="sidebar-header">
      <span class="brand" *ngIf="!sidebarCollapsed">📈 Trade Alert</span>
      <span class="brand-icon" *ngIf="sidebarCollapsed">📈</span>
      <button class="toggle-btn" (click)="toggleSidebar()">
        {{ sidebarCollapsed ? '→' : '←' }}
      </button>
    </div>

    <nav class="nav-menu">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-item"
      >
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">

      <!-- Profile button -->
      <div class="profile-btn" (click)="goToProfile()" [class.active]="router.url === '/profile'">
        <div class="mini-avatar">
          <img *ngIf="getPhotoUrl()" [src]="getPhotoUrl()" alt="avatar" />
          <span *ngIf="!getPhotoUrl()">{{ getInitials() }}</span>
        </div>
        <div class="profile-info" *ngIf="!sidebarCollapsed">
          <span class="profile-name" *ngIf="profile">{{ profile.firstName }} {{ profile.lastName }}</span>
          <span class="profile-email">{{ userEmail }}</span>
        </div>
      </div>

      <!-- Logout -->
      <button class="logout-btn" (click)="logout()">
        <span class="nav-icon">🚪</span>
        <span *ngIf="!sidebarCollapsed">Logout</span>
      </button>

    </div>

  </aside>

  <!-- Main content -->
  <main class="main-content">
    <router-outlet />
  </main>

</div>

<!-- Global toast notifications -->
<app-toast />
