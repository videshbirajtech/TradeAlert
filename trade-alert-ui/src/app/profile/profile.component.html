<div class="page">

  <div class="page-header">
    <h2>Profile</h2>
    <p>Manage your account information</p>
  </div>

  <div class="loading-state" *ngIf="loading">Loading profile...</div>

  <div class="profile-layout" *ngIf="!loading && profile">

    <!-- Photo Card -->
    <div class="card photo-card">
      <div class="avatar-wrapper">
        <div class="avatar" (click)="fileInput.click()">
          <img *ngIf="photoPreview" [src]="photoPreview" alt="Profile photo" />
          <span *ngIf="!photoPreview" class="initials">{{ getInitials() }}</span>
          <div class="avatar-overlay">
            <span *ngIf="!uploadingPhoto">📷</span>
            <span *ngIf="uploadingPhoto" class="spinner">⏳</span>
          </div>
        </div>
        <input
          #fileInput
          type="file"
          accept=".jpg,.jpeg,.png"
          style="display:none"
          (change)="onFileSelected($event)"
        />
      </div>
      <p class="photo-hint">Click photo to change</p>
      <h3 class="profile-name">{{ profile.firstName }} {{ profile.lastName }}</h3>
      <p class="profile-email">{{ profile.email }}</p>
      <p class="member-since">Member since {{ profile.createdDate | date:'MMM yyyy' }}</p>
    </div>

    <!-- Edit Card -->
    <div class="card edit-card">
      <h3>Edit Information</h3>

      <div class="form-section">
        <div class="row">
          <div class="field">
            <label>First Name</label>
            <input type="text" [(ngModel)]="firstName" placeholder="First name" />
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" [(ngModel)]="lastName" placeholder="Last name" />
          </div>
        </div>

        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" placeholder="Email" />

        <button (click)="saveProfile()" [disabled]="saving || !firstName || !lastName || !email">
          <span *ngIf="!saving">Save Changes</span>
          <span *ngIf="saving">Saving...</span>
        </button>
      </div>
    </div>

  </div>
</div>
